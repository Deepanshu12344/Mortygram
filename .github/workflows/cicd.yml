name: mortygram CI/CD Pipeline
#njijjo
on:
  push:
    branches: ["main"]

jobs:
  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Secure CI/CD Scanner + Dashboard Ingest
        uses: Deepanshu12344/secure_cicd_pipeline/.github/actions/secure-pipeline@main
        with:
          python-version: "3.11"
          target-path: "."
          risk-threshold: "80"
          fail-on-critical: "true"

          dashboard-url: ${{ secrets.DASHBOARD_URL }}
          dashboard-backup-url: ${{ secrets.DASHBOARD_BACKUP_URL }}
          dashboard-api-key: ${{ secrets.CI_INGEST_API_KEY }}
          dashboard-project-id: ${{ secrets.DASHBOARD_PROJECT_ID }}
          require-dashboard-ingest: "true"

  build_and_push:
    name: Build and Push Docker Image
    needs: security_scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"

      - name: Build Docker Image
        run: docker build -t deepanshu091224/mortygram:${{ github.sha }} .

      - name: Push Docker Image
        run: docker push deepanshu091224/mortygram:${{ github.sha }}

  deploy:
    name: Deploy Container
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: Pull Latest Docker Image
        run: sudo docker pull deepanshu091224/mortygram:${{ github.sha }}

      - name: Remove Old Container
        run: docker rm -f mortygram-container || true

      - name: Run New Container
        run: |
          docker run -d \
            -p 7070:7070 \
            --name mortygram-container \
            deepanshu091224/mortygram:${{ github.sha }}